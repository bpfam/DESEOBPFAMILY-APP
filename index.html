<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BPFAM App</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BPFAM">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
</head>

<body>

  <div id="splash" class="splash">
    <img src="logo.jpg.PNG" class="splash-logo" alt="BPFAM Logo">
    <p>Quality. Style. Respect.</p>
  </div>

  <main class="app">

    <header class="top-bar">
      <div>
        <p class="small-title">Official Network</p>
        <h1>DESEO BP FAMILY</h1>
      </div>

      <button class="cart-btn" onclick="openSection('carrello')">
        🛒 <span id="cartCount">0</span>
      </button>
    </header>

    <section class="hero">
      <img src="logo.jpg.PNG" class="logo" alt="BPFAM Logo">

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cerca nella vetrina..." oninput="searchProducts()">
      </div>

      <div class="promo-banner">
        <strong>🔥 Novità della settimana</strong>
        <p>Scopri gli ultimi arrivi e le sezioni aggiornate.</p>
        <button onclick="openSection('vetrina')">Vai alla Vetrina</button>
      </div>
    </section>

    <section class="quick-actions">
      <button onclick="openSection('vetrina')">🛍️ Ultimi arrivi</button>
      <button onclick="openSection('recensioni')">⭐ Recensioni</button>
      <button onclick="openSection('vip')">👑 VIP</button>
    </section>

    <section class="menu-grid">
      <button class="menu-card" onclick="openSection('vetrina')">
        <span>🛍️</span>
        <strong>Vetrina</strong>
      </button>

      <button class="menu-card" onclick="openSection('recensioni')">
        <span>⭐</span>
        <strong>Recensioni</strong>
      </button>

      <button class="menu-card" onclick="openSection('vip')">
        <span>👑</span>
        <strong>VIP Access</strong>
      </button>

      <button class="menu-card" onclick="openSection('contatti')">
        <span>📞</span>
        <strong>Contatti</strong>
      </button>

      <button class="menu-card" onclick="openSection('info')">
        <span>ℹ️</span>
        <strong>Info</strong>
      </button>

      <button class="menu-card" onclick="openSection('carrello')">
        <span>🛒</span>
        <strong>Carrello</strong>
      </button>
    </section>

    <section id="content" class="content-card">
      <h2>Prodotti in evidenza</h2>
      <p>Apri la vetrina per vedere catalogo, formati e disponibilità.</p>
      <button class="contact-btn" onclick="openSection('vetrina')">Apri Vetrina</button>
    </section>
  </main>

  <div id="updateBox" class="update-box">
    <h3>🚀 Nuova versione disponibile</h3>
    <p>Aggiorna BPFAM per vedere le ultime modifiche.</p>
    <button onclick="updateApp()">Aggiorna ora</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
